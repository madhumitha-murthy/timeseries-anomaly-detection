version: "3.8"

services:
  api:
    build:
      context: .
    ports:
      - "8000:8000"
    volumes:
      # Mount trained model so it persists outside the container
      - ./models:/app/models
      # Mount outputs so plots / results are accessible on the host
      - ./outputs:/app/outputs
    # THRESHOLD is loaded automatically from models/threshold.json at startup.
    # Uncomment and set manually only if you need to override the trained value.
    # environment:
    #   THRESHOLD: "6.992002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
